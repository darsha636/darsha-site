<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffffff; /* white background */
    }

    img {
      width: 300px;           /* logo size */
      animation: fade 2s ease-in-out infinite;
    }

    @keyframes fade {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <!-- Your Logo -->
  <img src="images/logo.jpg" alt="Logo">

  <script>
    // After 3 seconds → go to home page
    setTimeout(() => {
      window.location.href = "index.html";
    }, 3000);
  </script>

</body>
</html>
